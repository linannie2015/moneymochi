<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="pinkG" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#F8D6DA"/><stop offset="0.5" stop-color="#E7A6AD"/><stop offset="1" stop-color="#CB818B"/>
    </radialGradient>
    <radialGradient id="creamG" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#FFFCF6"/><stop offset="0.5" stop-color="#F3E9D6"/><stop offset="1" stop-color="#DCCBB0"/>
    </radialGradient>
    <radialGradient id="greenG" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#A7E1A6"/><stop offset="0.5" stop-color="#57B45A"/><stop offset="1" stop-color="#3A9244"/>
    </radialGradient>
    <linearGradient id="stickG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D6AE"/><stop offset="0.5" stop-color="#E4C295"/><stop offset="1" stop-color="#CFA877"/>
    </linearGradient></defs>
  <rect x="6" y="6" width="500" height="500" rx="122" fill="#FAF1EA"/>
  <!-- soft contact shadow -->
  <ellipse cx="300" cy="444" rx="86" ry="21" fill="#C98B7E" opacity="0.16"/>
  <g transform="rotate(-20 256 256)">
    <!-- skewer behind balls (tips poke out both ends) -->
    <line x1="256" y1="42" x2="256" y2="472" stroke="url(#stickG)" stroke-width="22" stroke-linecap="round"/>
    <line x1="262" y1="48" x2="262" y2="466" stroke="#C49A66" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <!-- green (bottom) -->
    <circle cx="256" cy="360" r="80" fill="url(#greenG)"/>
    <ellipse cx="230" cy="330" rx="24" ry="15" fill="#FFFFFF" opacity="0.45"/>
    <!-- cream (middle) -->
    <circle cx="256" cy="256" r="82" fill="url(#creamG)"/>
    <ellipse cx="229" cy="226" rx="25" ry="16" fill="#FFFFFF" opacity="0.6"/>
    <!-- pink (top) -->
    <circle cx="256" cy="152" r="78" fill="url(#pinkG)"/>
    <ellipse cx="230" cy="124" rx="24" ry="15" fill="#FFFFFF" opacity="0.55"/>
  </g>
</svg>